input {
  file {
    path => "/logs/training.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
  }
}

filter {
  grok {
    match => { "message" => "%{TIMESTAMP_ISO8601:log_timestamp} - %{LOGLEVEL:log_level} - %{GREEDYDATA:log_message}" }
  }
  mutate {
    remove_field => ["message", "@version", "host", "log", "event"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "ml-training-logs"
  }
  stdout {
    codec => rubydebug {
      metadata => false
    }
  }
}
